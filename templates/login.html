<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="shell shell-narrow">
    <section class="hero">
      <p class="eyebrow">Secure access</p>
      <h1>Sign in to continue</h1>
      <p class="lede">Enter your email address and password to continue.</p>
    </section>
    <section class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="messages">
            {% for category, message in messages %}
              <div class="message message-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      <form class="upload-form" action="{{ url_for('login') }}" method="post">
        <input type="hidden" name="next" value="{{ next_url or '' }}">
        <label class="field"><span>Email</span><input type="email" name="username" required></label>
        <label class="field"><span>Password</span><input type="password" name="password" required></label>
        <button type="submit">Log in</button>
      </form>
    </section>
  </main>
</body>
</html>
